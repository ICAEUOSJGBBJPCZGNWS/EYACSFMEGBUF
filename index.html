<div id="game-container">
  <div id="start-overlay">
    <p class="instruction"></p>
  </div>

  <div id="entity-container" class="breathing">
    <img id="entity-sprite" src="sprite_entidade.png" alt="A Entidade">
  </div>

  <div id="dialogue-box"></div>

  <div id="input-container" class="hidden">
    <input type="text" id="user-input" autocomplete="off">
    <p class="instruction">[ PRESSIONE ENTER ]</p>
  </div>
</div>

<audio id="jumpscare-audio" preload="auto">
    <source src="jumpscare.mp3" type="audio/mpeg">
</audio>

<audio id="voice-1" src="toque1.mp3" preload="auto"></audio>
<audio id="voice-2" src="toque2.mp3" preload="auto"></audio>
<audio id="voice-3" src="toque3.mp3" preload="auto"></audio>

<form id="formspree-form" action="https://formspree.io/f/mlgpwyeo" method="POST" style="display:none;">
  <div id="hidden-inputs"></div>
</form>

<style>
@font-face {
    @import url('https://fonts.googleapis.com/css2?family=Jersey+10&display=swap');
    font-family: 'Alkhemikal';
    src: url('Alkhemikal.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
body {
  background-color: #000;
  color: #fff;
  font-family: "Alkhemikal";
  letter-spacing: 2px;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  overflow: hidden;
}

#game-container {
  margin-top: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* Centraliza verticalmente o conjunto todo */
  text-align: center;
  position: relative;
  width: 100%;
  max-width: 800px;
  height: 100%; /* Ocupa a altura total disponível */
}

#start-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(
    0,
    0,
    0,
    0
  );
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

/* CONTAINER DA ENTIDADE - Espaço reservado e fixo */
#entity-container {
    position: fixed;
    min-height: 950px;
    width: 100%;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    z-index: -5;
    pointer-events: none;
}

#entity-sprite {
  scale: 2.5;
  z-index: -1;
  max-height: 300px;
  transition: transform 0.1s ease-out;
}
@keyframes breathing {
  0%,
  100% {
    transform: scale(1);
    opacity: 0.8;
  }
  50% {
    transform: scale(1.03);
    opacity: 1;
  }
}
.breathing {
  animation: breathing 4s ease-in-out infinite;
}

@keyframes sway {
  0%,
  100% {
    transform: rotate(-1deg) translateX(-2px);
  }
  50% {
    transform: rotate(1deg) translateX(2px);
  }
}
.swaying {
  animation: sway 6s ease-in-out infinite;
}

@keyframes jumpscareZoom {
      0% { transform: translate(3px, 0); }
    10% { transform: translate(-3px, 0); }
    20% { transform: translate(3px, 0); }
    30% { transform: translate(-3px, 0); }
    40% { transform: translate(3px, 0); }
    50% { transform: translate(-3px, 0); }
    60% { transform: translate(3px, 0); }
    70% { transform: translate(-3px, 0); }
    80% { transform: translate(3px, 0); }
    90% { transform: translate(-3px, 0); }
    100% { transform: translate(3px, 0); }
}
.jumpscare-effects {
  animation: jumpscareZoom 0.5s ease-out 1;
  animation-timing-function: linear;
}

@keyframes jumpscareFinal {
    0% { transform: translate(3px, 0) scale(1); }
    10% { transform: translate(-3px, 0) scale(2); }
    20% { transform: translate(3px, 0) scale(3); }
    30% { transform: translate(-3px, 0) scale(4); }
    40% { transform: translate(3px, 0) scale(5); }
    50% { transform: translate(-3px, 0) scale(6); }
    60% { transform: translate(3px, 0) scale(6); }
    70% { transform: translate(-3px, 0) scale(6); }
    80% { transform: translate(3px, 0) scale(6); }
    90% { transform: translate(-3px, 0) scale(6); }
    100% { transform: translate(3px, 0) scale(6); }
}

.jumpscare-final {
  animation: jumpscareFinal 1s;
  animation-timing-function: linear;
  animation-fill-mode: forwards;
  animation-iteration-count: 1;
}

#dialogue-box {
  min-height: 315px;
  font-size: 2.5rem;
  max-width: 600px;
  text-align: center;
  display: flex;
  position: fixed;
  flex-direction: column;
  align-items: center;
  line-height: 1;
  margin-bottom: 2px;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
  image-rendering: pixelated;
  pointer-events: none;
  z-index: 1;
}

.hidden {
  display: none;
}

#user-input {
  font-family: "Jersey 10", monospace;
  letter-spacing: 2px;
  background: transparent;
  border: none;
  border-bottom: 2px solid #fff;
  color: #fff;
  font-size: 1.2rem;
  text-align: center;
  outline: none;
  width: 300px;
  z-index: -2;
}
.instruction {
  font-size: 1rem;
  color: #666;
  margin-top: 10px;
}
</style>
<script>
// ==========================================
// CONFIGURAÇÃO DO SCRIPT RAMIFICADO
// ==========================================
const script = {
  inicio: {
    text: "Qual é o seu nome, de novo?",
    field: "nome",
    next: "inicio2"
  },
  inicio2: {
    text: "Por que você mataria o prefeito?",
    field: "matar",
    next: "FIM"
  },
}
};

// ==========================================
// VARIÁVEIS E CONFIGURAÇÕES (MANTIDAS)
// ==========================================
const VELOCIDADE_DIGITACAO = 60;
const TEMPO_BASE_LEITURA = 1000;
const TEMPO_POR_CARACTERE = 40;
const entitySleep = "https://i.imgur.com/teKx1FN.png";
const spritesFala = [
  "https://i.imgur.com/Ba4PhWE.png",
  "https://i.imgur.com/WCSq4I4.png",
  "https://i.imgur.com/9WX3XCb.png"
];
const spriteJumpscare = "https://i.imgur.com/264o5Tc.png";

const dialogueBox = document.getElementById("dialogue-box");
const inputContainer = document.getElementById("input-container");
const userInput = document.getElementById("user-input");
const hiddenInputs = document.getElementById("hidden-inputs");
const form = document.getElementById("formspree-form");
const startOverlay = document.getElementById("start-overlay");
const entitySprite = document.getElementById("entity-sprite");
const jumpscareAudio = document.getElementById("jumpscare-audio");
const sonsFala = [
  document.getElementById("voice-1"),
  document.getElementById("voice-2"),
  document.getElementById("voice-3")
];
const nomesReais = [
  "alex",
  "raphaela",
  "bruno",
  "ana cecilia",
  "ana clara",
  "talita",
  "felipe",
  "luiza",
  "gigi",
  "giovanna",
  "ana",
  "tata",
  "lulu"
];

let currentID = "inicio"; // Agora controlamos por ID, não por número
let isSpeaking = false;
let animationInterval;

function tocarSomAleatorio() {
  // Escolhe um índice de 0 a 2
  const indice = Math.floor(Math.random() * sonsFala.length);
  const som = sonsFala[indice];

  // Reseta o som para o início (essencial para sons rápidos)
  som.currentTime = 0;

  // Toca o som (com volume um pouco mais baixo para não cansar o ouvido)
  som.volume = 0.4;
  som.play().catch((e) => {}); // O catch evita erros se o navegador bloquear
}

// ==========================================
// FUNÇÕES DE ANIMAÇÃO (MANTIDAS)
// ==========================================
function startEntityAnimation() {
  if (animationInterval) return;
  animationInterval = setInterval(() => {
    const randomIndex = Math.floor(Math.random() * spritesFala.length);
    entitySprite.src = spritesFala[randomIndex];
  }, 85);
}

function stopEntityAnimation() {
  clearInterval(animationInterval);
  animationInterval = null;
  entitySprite.src = spritesFala[0];
}

// ==========================================
// LÓGICA DE NAVEGAÇÃO (RECONSTRUÍDA)
// ==========================================

function typeWriter(text, i = 0) {
  if (i === 0) {
    isSpeaking = true;
    startEntityAnimation();
    dialogueBox.innerHTML = "";
  }

  if (i < text.length) {
    dialogueBox.innerHTML = text.substring(0, i + 1);

    // --- NOVIDADE AQUI ---
    // Só toca som se não for um espaço vazio (fica mais natural)
    if (text[i] !== " ") {
      tocarSomAleatorio();
    }
    // ---------------------

    setTimeout(() => typeWriter(text, i + 1), VELOCIDADE_DIGITACAO);
  } else {
    stopEntityAnimation();
    isSpeaking = false;
    finishStep(text);
  }
}

function finishStep(text) {
  const current = script[currentID];

  if (current && current.field) {
    inputContainer.classList.remove("hidden");
    userInput.focus();
  } else {
    const tempoDeLeitura =
      TEMPO_BASE_LEITURA + text.length * TEMPO_POR_CARACTERE;
    setTimeout(() => {
      if (!isSpeaking) advance("AUTO");
    }, tempoDeLeitura);
  }
}

function advance(answer = "") {
  const current = script[currentID];
  if (!current) return;
  
  let nextID;
  if (typeof current.next === "function") {
    nextID = current.next(answer); // Ramifica baseado na resposta
  } else {
    nextID = current.next; // Segue o fluxo fixo
  }

  if (nextID === "FIM") {
    submitForm();
    return;
  }

  currentID = nextID;
  inputContainer.classList.add("hidden");
  userInput.value = "";
  dialogueBox.innerHTML = "";

  setTimeout(() => {
    typeWriter(script[currentID].text);
  }, 500);
}

// ==========================================
// INPUT E EVENTOS (RECONSTRUÍDO)
// ==========================================

startOverlay.addEventListener("click", () => {
  if (isSpeaking) return;
  startOverlay.style.display = "none";
  jumpscareAudio.play().catch((e) => console.log("Áudio bloqueado"));

  entitySprite.src = spriteJumpscare;
  entitySprite.classList.add("jumpscare-effects");

  setTimeout(() => {
    entitySprite.classList.remove("jumpscare-effects");
    entitySprite.src = spritesFala[0];
    entitySprite.classList.add("swaying");

    setTimeout(() => {
      currentID = "inicio";
      typeWriter(script[currentID].text);
    }, 1200);
  }, 500);
});

userInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter" && userInput.value.trim() !== "" && !isSpeaking) {
    const raw = userInput.value.trim();
    const limpa = raw
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
    const current = script[currentID];

    // 3. Salva no Formspree
    const hidden = document.createElement("input");
    hidden.type = "hidden";
    hidden.name = current.field || "info";
    hidden.value = raw;
    hiddenInputs.appendChild(hidden);

    advance(raw);
  }
});

function submitForm() {
  entitySprite.src = entitySleep;
  dialogueBox.innerHTML = "";
  const data = new FormData(form);
  fetch(form.action, {
    method: "POST",
    body: data,
    headers: { Accept: "application/json" }
  });
}

</script>
